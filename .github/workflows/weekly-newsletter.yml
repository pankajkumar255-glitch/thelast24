name: Weekly newsletter

on:
  schedule:
    - cron: "30 2 * * 0"   # Sundays 08:00 IST
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Build preference-based digests
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: python scripts/build_newsletter.py
      - name: Commit digests
        run: |
          git config user.name "edition-bot"
          git config user.email "bot@users.noreply.github.com"
          git add newsletter/
          git diff --cached --quiet || git commit -m "Weekly newsletter $(date -u +%F)"
          git push
