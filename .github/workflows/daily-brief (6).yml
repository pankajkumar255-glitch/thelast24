name: Publish edition

on:
  schedule:
    - cron: "15 */6 * * *"   # every 6 hours at :15 UTC (00:15, 06:15, 12:15, 18:15 = 05:45, 11:45, 17:45, 23:45 IST)
  workflow_dispatch:
    inputs:
      backfill_days:
        description: "Backfill: pull this many past days (use 7 on first run to pre-populate the site; 0 = normal hourly run)"
        required: false
        default: "0"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: publish
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install feedparser requests
      - name: Build edition + articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SITE_URL: ${{ vars.SITE_URL }}
          BACKFILL_DAYS: ${{ inputs.backfill_days || '0' }}
        run: python scripts/build_edition.py
      - name: Commit and publish
        run: |
          git config user.name "edition-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.js archive.html current-affairs.js current-affairs.html editions/ articles/ sitemap.xml tweets/
          git diff --cached --quiet && echo "No changes to publish." && exit 0
          git commit -m "Edition $(date -u +'%F %H:%M')"
          # The bot owns the generated files. If the remote moved (e.g. manual
          # uploads), merge with "ours" so generated files never conflict.
          for attempt in 1 2 3; do
            git fetch origin main
            if git merge -X ours --no-edit origin/main; then
              if git push; then
                echo "Published on attempt $attempt."
                exit 0
              fi
            fi
            echo "Push attempt $attempt failed; retrying after sync..."
            sleep 5
          done
          echo "Could not publish after 3 attempts." && exit 1
